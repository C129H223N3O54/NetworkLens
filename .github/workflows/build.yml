name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build NetworkLens
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NetworkLens/NetworkLens.csproj

      - name: Build (Debug check)
        run: dotnet build NetworkLens/NetworkLens.csproj -c Debug --no-restore

      - name: Publish self-contained single-file exe
        run: |
          dotnet publish NetworkLens/NetworkLens.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:EnableCompressionInSingleFile=true `
            --no-restore `
            -o ./publish

      - name: Create self-signed certificate and sign exe
        shell: pwsh
        run: |
          # Create self-signed code signing certificate
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=NetworkLens, O=Jan Erik Mueller, C=DE" `
            -KeyUsage DigitalSignature `
            -FriendlyName "NetworkLens Code Signing" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -NotAfter (Get-Date).AddYears(5)

          # Export to PFX
          $pwd = ConvertTo-SecureString -String "NetworkLens2024!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath cert.pfx -Password $pwd

          # Find signtool.exe - prefer x64 version explicitly
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            # Fallback: any signtool that is NOT arm64
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -notmatch "arm" } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if ($signtool) {
            Write-Host "Using signtool: $signtool"
            & $signtool sign /f cert.pfx /p "NetworkLens2024!" `
              /fd SHA256 /t http://timestamp.digicert.com `
              ./publish/NetworkLens.exe
            Write-Host "Signed successfully"
          } else {
            Write-Host "signtool not found, skipping signing"
          }

      - name: List publish output
        run: dir ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkLens-win-x64
          path: ./publish/NetworkLens.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $repo = "${{ github.repository }}"
          $tag  = $env:TAG

          # Delete existing release for this tag if it exists
          $existing = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" `
            -Headers $headers -Method Get -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Deleting existing release id=$($existing.id)"
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($existing.id)" `
              -Headers $headers -Method Delete
          }

          # Create new release
          $body = @{
            tag_name   = $tag
            name       = "NetworkLens $tag"
            body       = "## NetworkLens $tag`n`n### Features`n- Netzwerk-Scan, Port-Scanner, Netzwerk-Info`n- Live-Monitor mit Ping/Jitter/Packet Loss Graph`n- Kontextmenu: HTTP/HTTPS/FTP/SSH/Telnet/Traceroute/GeoLocate`n- Reports: HTML, CSV, JSON`n- Dark Theme, Self-Contained .exe`n`n### Installation`n1. NetworkLens.exe herunterladen`n2. Direkt starten - kein .NET erforderlich`n3. Als Administrator starten fur vollen Funktionsumfang`n`n---`n*Idee and Konzept: Jan Erik Mueller | Entwicklung: Claude (Anthropic)*"
            draft      = $false
            prerelease = $false
            make_latest = "true"
          } | ConvertTo-Json

          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" `
            -Headers $headers -Method Post -Body $body -ContentType "application/json"
          Write-Host "Created release id=$($release.id)"

          # Upload exe asset
          $uploadUrl = $release.upload_url -replace '\{.*\}', ''
          $exePath   = "./publish/NetworkLens.exe"
          $exeBytes  = [System.IO.File]::ReadAllBytes($exePath)

          $uploadHeaders = $headers.Clone()
          $uploadHeaders["Content-Type"] = "application/octet-stream"

          Invoke-RestMethod -Uri "${uploadUrl}?name=NetworkLens.exe" `
            -Headers $uploadHeaders -Method Post -Body $exeBytes
          Write-Host "Uploaded NetworkLens.exe successfully"
