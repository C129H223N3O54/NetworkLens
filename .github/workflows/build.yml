name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build NetworkLens
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NetworkLens/NetworkLens.csproj

      - name: Build (Debug check)
        run: dotnet build NetworkLens/NetworkLens.csproj -c Debug --no-restore

      - name: Publish self-contained single-file exe
        run: |
          dotnet publish NetworkLens/NetworkLens.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:EnableCompressionInSingleFile=true `
            --no-restore `
            -o ./publish

      - name: Create self-signed certificate and sign exe
        shell: pwsh
        run: |
          # Create self-signed code signing certificate
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=NetworkLens, O=Jan Erik Mueller, C=DE" `
            -KeyUsage DigitalSignature `
            -FriendlyName "NetworkLens Code Signing" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -NotAfter (Get-Date).AddYears(5)

          # Export to PFX
          $pwd = ConvertTo-SecureString -String "NetworkLens2024!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath cert.pfx -Password $pwd

          # Find signtool.exe - prefer x64 version explicitly
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            # Fallback: any signtool that is NOT arm64
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -notmatch "arm" } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if ($signtool) {
            Write-Host "Using signtool: $signtool"
            & $signtool sign /f cert.pfx /p "NetworkLens2024!" `
              /fd SHA256 /t http://timestamp.digicert.com `
              ./publish/NetworkLens.exe
            Write-Host "Signed successfully"
          } else {
            Write-Host "signtool not found, skipping signing"
          }

      - name: List publish output
        run: dir ./publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkLens-win-x64
          path: ./publish/NetworkLens.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NetworkLens ${{ github.ref_name }}
          body: |
            ## NetworkLens ${{ github.ref_name }}

            ### 🎉 Initial Release

            Portabler Windows-Netzwerkscanner — keine Installation erforderlich.

            ### Features
            - 🔍 **Netzwerk-Scan** — Paralleler Ping-Sweep, Live-Ergebnisse, DNS, MAC, Hersteller
            - 🔌 **Port-Scanner** — Quick/Standard/Full/Custom, Banner-Grabbing
            - 📊 **Netzwerk-Info** — IP, Gateway, DNS, WLAN, Adapter, netstat
            - 📡 **Live-Monitor** — Ping/Jitter/Packet Loss Graph, Doppelklick Vollbild
            - 🏷 **Geräte-Verwaltung** — Alias, Kategorie, Favoriten
            - 📄 **Reports** — HTML, CSV, JSON, Scan-Vergleich
            - 🖥 **Kontextmenü** — HTTP/HTTPS/FTP/SSH/Telnet/Traceroute/GeoLocate

            ### Installation
            1. `NetworkLens.exe` herunterladen
            2. Direkt starten — kein .NET erforderlich
            3. Für volle Funktion: Als Administrator ausführen

            ### Hinweis
            Falls Windows Smart App Control die App blockiert:
            Rechtsklick → Eigenschaften → "Zulassen" → OK

            ---
            *Idee & Konzept: Jan Erik Mueller | Entwicklung: Claude (Anthropic)*
          files: ./publish/NetworkLens.exe
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
