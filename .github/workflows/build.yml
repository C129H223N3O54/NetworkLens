name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  build:
    name: Build NetworkLens
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET Setup ───────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Restore ──────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore NetworkLens/NetworkLens.csproj

      # ── Build ────────────────────────────────────
      - name: Build (Debug check)
        run: dotnet build NetworkLens/NetworkLens.csproj -c Debug --no-restore

      # ── Publish Single-File EXE ──────────────────
      - name: Publish self-contained single-file exe
        run: |
          dotnet publish NetworkLens/NetworkLens.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:EnableCompressionInSingleFile=true `
            --no-restore `
            -o ./publish

      # ── List output ──────────────────────────────
      - name: List publish output
        run: dir ./publish

      # ── Upload artifact (always, even without tag) ──
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkLens-win-x64
          path: ./publish/NetworkLens.exe
          retention-days: 30

      # ── Create GitHub Release (only on tag push) ─
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NetworkLens ${{ github.ref_name }}
          body: |
            ## NetworkLens ${{ github.ref_name }}

            ### Installation
            1. `NetworkLens.exe` herunterladen
            2. Direkt starten — kein .NET-Install nötig
            3. Optional: Als Administrator starten für vollen Funktionsumfang (ARP, alle MACs)

            ### Änderungen
            _Siehe Commit-History_

            ### Systemanforderungen
            - Windows 10 / 11 (x64)
            - Kein .NET erforderlich (self-contained)
          files: |
            ./publish/NetworkLens.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
